name: Strapi Full Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: strapi-repo-libin
  ECS_CLUSTER: strapi-cluster-libin
  ECS_SERVICE: strapi-service-libin
  TASK_FAMILY: strapi-task-libin
  CODEDEPLOY_APP: strapi-codedeploy-libin
  CODEDEPLOY_GROUP: strapi-deployment-group-libin
  S3_BUCKET: strapi-terraform-state-libin

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Build & Push Docker Image to ECR
  # ──────────────────────────────────────────────
  build:
    name: Build & Push Image to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.set-image.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION \
            || aws ecr create-repository --repository-name $ECR_REPOSITORY --region $AWS_REGION

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: set-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

          docker build -t $IMAGE_URI ./my-strapi-app
          docker push $IMAGE_URI

          # Also tag as latest
          docker tag  $IMAGE_URI $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:latest

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Pushed: $IMAGE_URI"

  # ──────────────────────────────────────────────
  # JOB 2 — Terraform Init + Apply
  # ──────────────────────────────────────────────
  terraform:
    name: Terraform Infrastructure Apply
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false   # Ensures clean output for scripting

      - name: Ensure S3 backend bucket exists
        run: |
          aws s3api head-bucket --bucket $S3_BUCKET 2>/dev/null \
            || aws s3 mb s3://$S3_BUCKET --region $AWS_REGION

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=$S3_BUCKET" \
            -backend-config="key=strapi/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="image=${{ needs.build.outputs.image_uri }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve tfplan
          echo "✅ Terraform infrastructure applied successfully"

  # ──────────────────────────────────────────────
  # JOB 3 — Deploy via CodeDeploy (Blue/Green)
  # ──────────────────────────────────────────────
  deploy:
    name: CodeDeploy Blue/Green Deployment
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set IMAGE_URI
        run: |
          echo "IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_ENV

      - name: Render task definition
        run: |
          sed "s|IMAGE_URI|$IMAGE_URI|g; s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g" \
            ./taskdef.json > taskdef-updated.json
          echo "📄 Rendered taskdef-updated.json:"
          cat taskdef-updated.json

      - name: Register task definition
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV
          echo "✅ Registered: $TASK_DEF_ARN"

      - name: Render appspec
        run: |
          sed "s|TASK_DEFINITION|$TASK_DEF_ARN|g" ./appspec.yaml > appspec-updated.yaml
          mv appspec-updated.yaml appspec.yaml
          echo "📄 Final appspec.yaml:"
          cat appspec.yaml

      - name: Create and upload deployment bundle to S3
        run: |
          zip deploy.zip appspec.yaml taskdef-updated.json
          unzip -l deploy.zip

          aws s3 cp deploy.zip s3://$S3_BUCKET/deploy-${{ github.sha }}.zip
          echo "✅ Bundle uploaded to s3://$S3_BUCKET/deploy-${{ github.sha }}.zip"

      - name: Trigger CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name      $CODEDEPLOY_APP \
            --deployment-group-name $CODEDEPLOY_GROUP \
            --deployment-config-name CodeDeployDefault.ECSCanary10Percent5Minutes \
            --s3-location bucket=$S3_BUCKET,bundleType=zip,key=deploy-${{ github.sha }}.zip \
            --description "Deploy ${{ github.sha }} via GitHub Actions" \
            --query deploymentId \
            --output text)

          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
          echo "🚀 CodeDeploy deployment triggered: $DEPLOYMENT_ID"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA       | \`${{ github.sha }}\` |"    >> $GITHUB_STEP_SUMMARY
          echo "| Image URI        | \`$IMAGE_URI\` |"            >> $GITHUB_STEP_SUMMARY
          echo "| Task Def ARN     | \`$TASK_DEF_ARN\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Deployment ID    | \`$DEPLOYMENT_ID\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by     | ${{ github.actor }} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Strategy         | ECSCanary10Percent5Minutes |"  >> $GITHUB_STEP_SUMMARY